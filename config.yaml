server:
  port: 8080
  mode: "release"

database:
  path: "llmgate.db"

jwt:
  secret: "your-jwt-secret-key-change-this-in-production"
  expire_hours: 24

models:
  - id: "llama3-70b"
    name: "Llama 3 70B"
    backend: "http://localhost:8001"
    enabled: true
    weight: 1
  - id: "qwen-72b"
    name: "Qwen 72B"
    backend: "http://localhost:8002"
    enabled: true
    weight: 1
  - id: "deepseek-67b"
    name: "DeepSeek 67B"
    backend: "http://localhost:8003"
    enabled: true
    weight: 1

quota_policies:
  - name: "default"
    rate_limit: 60
    rate_limit_window: 60
    token_quota_daily: 100000
    models:
      - "llama3-70b"
      - "qwen-72b"
      - "deepseek-67b"
  - name: "vip"
    rate_limit: 300
    rate_limit_window: 60
    token_quota_daily: 1000000
    models:
      - "*"

admin:
  default_email: "admin@llmgate.local"
  default_password: "admin123"

logs:
  path: "logs"
  retention_days: 7
